name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        django-version: ['4.2', '5.0', '5.2']
        exclude:
          # Django 4.2 supports 3.11/3.12; 5.0 supports 3.10-3.12; 5.2 supports 3.10-3.13.
          # Matrix as-is is supported across the board, no exclusions needed currently.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install pinned Django
        run: |
          python -m pip install --upgrade pip
          pip install "Django~=${{ matrix.django-version }}.0"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install package (editable)
        run: pip install -e .

      - name: Import check
        run: |
          python - <<'PY'
          import django_mcp
          from django_mcp.apps import DjangoMcpConfig
          print("django-mcp-framework", django_mcp.__version__)
          print("AppConfig:", DjangoMcpConfig.name)
          PY

      - name: Lint (ruff check)
        run: ruff check django_mcp/ tests/

      - name: Format check (ruff format)
        run: ruff format --check django_mcp/ tests/

      - name: Test suite (pytest)
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist/wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
