name: Publish

on:
  push:
    tags: ["pypi-*"]
  workflow_dispatch:

# Opt into Node.js 24 for JavaScript actions (Node 20 is deprecated; default
# flips 2026-06-02). Becomes a no-op once Node 24 is the runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC trusted publishing to PyPI

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          provenance: true
